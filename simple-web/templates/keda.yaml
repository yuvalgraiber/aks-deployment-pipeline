apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "simple-web.fullname" . }}-keda
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    name: {{ include "simple-web.fullname" . }}
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: cpu
      metadata:
        value: "50" # Scale when CPU exceeds 50%
    - type: memory
      metadata:
        value: "100Mi" # Scale when Memory exceeds 100Mi
    - type: cron
      metadata:
        timezone: Asia/Jerusalem
        start: 00 08 * * *
        end: 59 23 * * *    
        desiredReplicas: "3"